<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>IronHand — Find Skilled Workers, Fast</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #05070a;
    --surface: #0c0f16;
    --border: rgba(255, 255, 255, 0.08);
    --accent: #ffcc33;
    --accent-glow: rgba(255, 204, 51, 0.3);
    --text: #f0f2f5;
    --muted: #8a91ad;
    --card: #121620;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; overflow-x: hidden; }

  /* ── ANIMATIONS ── */
  .reveal { opacity: 0; transform: translateY(30px); transition: all 0.8s cubic-bezier(0.2, 0.8, 0.2, 1); }
  .reveal.active { opacity: 1; transform: translateY(0); }

  /* ── NAV BAR  ── */
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
    padding: 18px 6vw;
    background: rgba(5, 7, 10, 0.85);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
  }
  .logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.5rem; color: var(--text); text-decoration: none; }
  .logo span { color: var(--accent); }
  nav ul { list-style: none; display: flex; gap: 2rem; }
  nav ul a { color: var(--muted); text-decoration: none; font-size: 0.9rem; transition: color 0.2s; }
  nav ul a:hover { color: var(--accent); }
  .nav-cta { background: var(--accent); color: #000; font-weight: 700; padding: 10px 20px; border-radius: 6px; text-decoration: none; font-size: 0.85rem; }

  /* ── HERO ── */
  .hero {
    min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center;
    text-align: center; padding: 120px 6vw 80px;
    background: radial-gradient(circle at 50% 50%, rgba(255, 204, 51, 0.04) 0%, transparent 70%);
  }
  h1 { font-family: 'Syne', sans-serif; font-size: clamp(2.8rem, 7vw, 5.5rem); font-weight: 800; letter-spacing: -2px; margin-bottom: 1rem; }
  h1 em { font-style: normal; color: var(--accent); text-shadow: 0 0 20px var(--accent-glow); }
  .hero-sub { color: var(--muted); max-width: 560px; line-height: 1.7; margin-bottom: 2.5rem; }

  .hero-search {
    display: flex; width: 100%; max-width: 580px; background: var(--surface);
    border: 1px solid var(--border); border-radius: 12px; overflow: hidden;
    transition: border-color 0.3s, box-shadow 0.3s;
  }
  .hero-search:focus-within { border-color: var(--accent); box-shadow: 0 0 15px rgba(255, 204, 51, 0.1); }
  .hero-search input { flex: 1; background: transparent; border: none; outline: none; color: #fff; padding: 18px; }
  .hero-search button { background: var(--accent); border: none; padding: 0 28px; font-weight: 700; cursor: pointer; font-family: 'Syne'; }

  /* ── WORKER GRID ── */
  .section { padding: 100px 6vw; }
  .workers-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 25px; }
  .worker-card {
    background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 24px;
    transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  }
  .worker-card:hover { border-color: var(--accent); transform: translateY(-10px); box-shadow: 0 20px 40px rgba(0,0,0,0.6); }

  .worker-avatar { width: 52px; height: 52px; background: var(--bg); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.4rem; border: 1px solid var(--border); margin-bottom: 15px; }
  .worker-role { color: var(--accent); font-weight: 700; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px; }
  .worker-rate { font-family: 'Syne'; font-weight: 800; font-size: 1.2rem; margin-top: 15px; }
  .hire-btn {
    width: 100%; margin-top: 15px; padding: 12px; border-radius: 8px; background: transparent;
    border: 1px solid var(--accent); color: var(--accent); font-weight: 700; cursor: pointer; transition: 0.3s;
  }
  .hire-btn:hover { background: var(--accent); color: #000; }
</style>
</head>
<body>

<nav>
  <a href="#" class="logo">Iron<span>Hand</span></a>
  <ul>
    <li><a href="#workers">Find Workers</a></li>
    <li><a href="#">Services</a></li>
    <li><a href="#">Post a Job</a></li>
  </ul>
  <a href="#" class="nav-cta">Get Started →</a>
  <a href="about.html" class="nav-cta" >About Us</a>
</nav>

<section class="hero">
  <div class="reveal">
    <h1>Hire <em>Skilled Workers</em><br>In Hours, Not Days</h1>
    <p class="hero-sub">Connect with verified laborers and tradespeople ready to work — on demand or long-term.</p>
    <div class="hero-search">
      <input type="text" id="searchInput" placeholder="Search by role (e.g. Plumber)..." />
      <button>Find Workers</button>
    </div>
  </div>
</section>

<section class="section" id="workers">
  <h2 class="reveal" style="font-family: 'Syne'; margin-bottom: 2rem;">Top Rated Professionals</h2>
  <div class="workers-grid" id="workerContainer">
    </div>
</section>

<script>
  const API_URL = 'http://localhost:8081/api/workers';
  let allWorkers = [];

  // ── REVEAL LOGIC ──
  function reveal() {
    const items = document.querySelectorAll('.reveal, .worker-card');
    items.forEach(item => {
      const top = item.getBoundingClientRect().top;
      if (top < window.innerHeight - 50) item.classList.add('active');
    });
  }

  // ── BACKEND SYNC ──
  async function syncData() {
    const container = document.getElementById('workerContainer');
    try {
      const response = await fetch(API_URL);
      allWorkers = await response.json();
      render(allWorkers);
    } catch (err) {
      container.innerHTML = `<p style="color:var(--accent)">Connection Error: Ensure IntelliJ is running on 8081!</p>`;
    }
  }

  function render(data) {
    const container = document.getElementById('workerContainer');
    container.innerHTML = data.map(w => `
      <div class="worker-card reveal">
        <div class="worker-top">
          <div class="worker-avatar">${w.icon || '👷'}</div>
          <div class="worker-role">${w.role}</div>
          <h3 style="margin: 5px 0;">${w.name}</h3>
          <p style="font-size: 0.85rem; color: var(--muted);">${w.bio}</p>
          <div class="worker-rate">$${w.rate}<span>/hr</span></div>
          <button class="hire-btn">Hire Now</button>
        </div>
      </div>
    `).join('');
    setTimeout(reveal, 100);
  }

  // ── LIVE SEARCH ──
  document.getElementById('searchInput').addEventListener('input', (e) => {
    const term = e.target.value.toLowerCase();
    const filtered = allWorkers.filter(w => 
      w.role.toLowerCase().includes(term) || w.name.toLowerCase().includes(term)
    );
    render(filtered);
  });

  window.addEventListener('scroll', reveal);
  document.addEventListener('DOMContentLoaded', () => {
    syncData();
    reveal();
  });
</script>

</body>
</html>
