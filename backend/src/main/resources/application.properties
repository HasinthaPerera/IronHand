server.port=8081
spring.application.name=backend
# 1. Database Connection
spring.datasource.url=jdbc:mysql://localhost:3306/ironhand
spring.datasource.username=root
spring.datasource.password=

# 2. The Driver (Ensure this is correct)
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 3. DO NOT manually set the dialect.
# If you MUST, use the modern generic one below.
# If this still fails, delete the line below entirely.
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# 4. Hibernate Behavior
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true