<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Register — IronHand</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #05070a;
    --surface: #0c0f16;
    --border: rgba(255, 255, 255, 0.08);
    --accent: #ffcc33;
    --accent-hover: #e6b82e;
    --text: #f0f2f5;
    --muted: #8a91ad;
    --error: #ff4d4d;
  }

  * { box-sizing: border-box; } /* Essential for layout stability */

  body { 
    background: var(--bg); 
    color: var(--text); 
    font-family: 'DM Sans', sans-serif; 
    display: flex; 
    justify-content: center; 
    align-items: center; 
    min-height: 100vh; 
    margin: 0;
    padding: 20px;
  }

  .register-card {
    background: var(--surface);
    padding: 40px;
    border-radius: 20px;
    border: 1px solid var(--border);
    width: 100%;
    max-width: 420px;
    text-align: center;
    box-shadow: 0 20px 40px rgba(0,0,0,0.5);
  }

  h2 { font-family: 'Syne'; font-size: 2.2rem; margin-bottom: 10px; letter-spacing: -1px; }
  h2 span { color: var(--accent); }
  p { color: var(--muted); margin-bottom: 30px; font-size: 0.95rem; }
  
  .input-group { text-align: left; margin-bottom: 20px; position: relative; }
  label { display: block; font-size: 0.8rem; margin-bottom: 8px; color: var(--muted); font-weight: 500; }
  
  input {
    width: 100%;
    padding: 14px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: white;
    outline: none;
    transition: all 0.2s ease;
    font-size: 1rem;
  }

  input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(255, 204, 51, 0.1); }
  
  /* Password Toggle Button */
  .toggle-pw {
    position: absolute;
    right: 12px;
    top: 38px;
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 0.75rem;
  }

  .register-btn {
    width: 100%;
    padding: 16px;
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 10px;
    font-weight: 800;
    cursor: pointer;
    font-family: 'Syne';
    transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    margin-top: 10px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .register-btn:hover:not(:disabled) { 
    background: var(--accent-hover);
    transform: translateY(-2px); 
    box-shadow: 0 8px 20px rgba(245,200,66,0.25); 
  }

  .register-btn:disabled {
    opacity: 0.6;
    cursor: not-allowed;
  }

  .footer-text { margin-top: 25px; font-size: 0.9rem; color: var(--muted); }
  .footer-text a { color: var(--accent); text-decoration: none; font-weight: 600; }
  .footer-text a:hover { text-decoration: underline; }

  .error-msg {
    color: var(--error);
    font-size: 0.8rem;
    margin-top: 5px;
    display: none;
  }
</style>
</head>
<body>

<div class="register-card">
  <h2>Iron<span>Hand</span></h2>
  <p>Forge your account and gain access.</p>
  
  <form id="registerForm">
    <div class="input-group">
      <label for="email">Email Address</label>
      <input type="email" id="email" required placeholder="name@company.com">
    </div>
    
    <div class="input-group">
      <label for="password">Password</label>
      <input type="password" id="password" required placeholder="At least 8 characters" minlength="8">
      <button type="button" class="toggle-pw" onclick="togglePass('password')">SHOW</button>
    </div>

    <div class="input-group">
      <label for="confirmPassword">Confirm Password</label>
      <input type="password" id="confirmPassword" required placeholder="Repeat password">
      <div id="matchError" class="error-msg">Passwords do not match</div>
    </div>

    <button type="submit" id="submitBtn" class="register-btn">Create Account</button>
  </form>
  
  <div class="footer-text">
    Already a member? <a href="login.html">Login here</a>
  </div>
</div>

<script>
  // Toggle password visibility
  function togglePass(id) {
    const el = document.getElementById(id);
    el.type = el.type === 'password' ? 'text' : 'password';
  }

  const form = document.getElementById('registerForm');
  const btn = document.getElementById('submitBtn');
  const errorMsg = document.getElementById('matchError');

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const confirmPassword = document.getElementById('confirmPassword').value;

    // Reset UI
    errorMsg.style.display = 'none';

    if (password !== confirmPassword) {
      errorMsg.style.display = 'block';
      return;
    }

    // Enter Loading State
    btn.disabled = true;
    btn.innerText = "CREATING ACCOUNT...";

    try {
      const response = await fetch('http://localhost:8082/api/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
      });

      if (response.ok) {
          alert("Success! Welcome to IronHand.");
          window.location.href = 'login.html';
      } else {
          const errorData = await response.json().catch(() => ({ message: "Unknown error occurred" }));
          alert("Registration Failed: " + (errorData.message || "Invalid credentials"));
      }
    } catch (error) {
      alert("Network Error: Could not connect to the authentication server.");
    } finally {
      // Exit Loading State
      btn.disabled = false;
      btn.innerText = "CREATE ACCOUNT";
    }
  });
</script>

</body>
</html>
